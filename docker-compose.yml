services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: splanned
      POSTGRES_PASSWORD: splanned
      POSTGRES_DB: splanned_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U splanned -d splanned_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
