<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="S-planned monochrome icon">
  <title>S-planned monochrome icon</title>
  <desc>S-planned icon mark — single colour, white version for use on brand-coloured or dark backgrounds</desc>

  <!-- Outer rounded square — transparent, use as overlay on coloured bg -->
