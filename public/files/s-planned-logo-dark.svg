<svg width="320" height="80" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="S-planned logo — dark variant">
  <title>S-planned (dark)</title>
  <desc>S-planned logo horizontal lockup — dark background variant</desc>
  <defs>
    <linearGradient id="grad-icon-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="shadow-dark" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#3B82F6" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="320" height="80" rx="16" fill="#0C2149"/>

  <!-- Icon mark -->
  <rect x="12" y="8" width="60" height="60" rx="13" fill="url(#grad-icon-dark)" filter="url(#shadow-dark)"/>
  <rect x="20" y="15" width="36" height="44" rx="4.5" fill="white"/>
  <!-- Row 1 — checked -->
  <rect x="24.5" y="24" width="8.5" height="8.5" rx="2" fill="#1757C2"/>
  <path d="M26 28.5L27.7 30.2L31.2 26" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="35.5" y="26.5" width="11" height="2.5" rx="1.25" fill="#C7D8F5"/>
  <!-- Row 2 — checked -->
  <rect x="24.5" y="35" width="8.5" height="8.5" rx="2" fill="#1757C2"/>
  <path d="M26 39.5L27.7 41.2L31.2 37" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="35.5" y="37.5" width="9" height="2.5" rx="1.25" fill="#C7D8F5"/>
  <!-- Row 3 — unchecked -->
  <rect x="24.5" y="46" width="8.5" height="6" rx="2" fill="none" stroke="#9BBFEE" stroke-width="1.2"/>
  <rect x="35.5" y="47.5" width="11" height="2.5" rx="1.25" fill="#4B6FA8"/>
  <!-- Progress bar -->
  <rect x="24.5" y="56" width="23" height="3" rx="1.5" fill="#4B6FA8"/>
  <rect x="24.5" y="56" width="15" height="3" rx="1.5" fill="#60A5FA"/>

  <!-- Wordmark -->
  <text x="88" y="46" font-family="'Nunito','Segoe UI',system-ui,sans-serif" font-size="30" font-weight="800" fill="white" letter-spacing="-0.5">S-planned</text>
  <!-- Tagline -->
  <text x="89" y="62" font-family="'Nunito','Segoe UI',system-ui,sans-serif" font-size="10" font-weight="700" fill="#4A6FA8" letter-spacing="3">PLAN · EXECUTE · PROVE</text>
</svg>
