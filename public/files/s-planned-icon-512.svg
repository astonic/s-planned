<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="S-planned icon mark">
  <title>S-planned icon</title>
  <desc>S-planned icon mark — 512px master SVG for scaling to all favicon and app icon sizes</desc>
  <defs>
    <linearGradient id="grad-512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1757C2"/>
    </linearGradient>
    <linearGradient id="grad-progress" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="shadow-512" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#1757C2" flood-opacity="0.20"/>
    </filter>
  </defs>

  <!-- Outer rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#grad-512)" filter="url(#shadow-512)"/>

  <!-- Back document (depth layer) -->
  <rect x="130" y="88" width="270" height="336" rx="28" fill="#3B82F6" opacity="0.42"/>

  <!-- Front document -->
  <rect x="98" y="112" width="270" height="316" rx="28" fill="white"/>

  <!-- Row 1 — checked checkbox -->
  <rect x="128" y="172" width="62" height="62" rx="13" fill="#1757C2"/>
  <path d="M140 203L156 219L190 183" fill="none" stroke="white" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Row 1 line -->
  <rect x="206" y="194" width="130" height="18" rx="9" fill="#C7D8F5"/>

  <!-- Row 2 — checked checkbox -->
  <rect x="128" y="254" width="62" height="62" rx="13" fill="#1757C2"/>
  <path d="M140 285L156 301L190 265" fill="none" stroke="white" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Row 2 line -->
  <rect x="206" y="276" width="106" height="18" rx="9" fill="#C7D8F5"/>

  <!-- Row 3 — unchecked checkbox -->
  <rect x="128" y="336" width="62" height="50" rx="13" fill="none" stroke="#C7D8F5" stroke-width="8"/>
  <!-- Row 3 line -->
  <rect x="206" y="352" width="130" height="18" rx="9" fill="#EEF1F8"/>

  <!-- Progress bar track -->
  <rect x="128" y="402" width="206" height="22" rx="11" fill="#EEF1F8"/>
  <!-- Progress bar fill — ~67% -->
  <rect x="128" y="402" width="138" height="22" rx="11" fill="url(#grad-progress)"/>
</svg>
