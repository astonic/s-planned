<svg width="180" height="150" viewBox="0 0 180 150" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="S-planned stacked logo">
  <title>S-planned (stacked)</title>
  <desc>S-planned logo — stacked variant with icon above wordmark and tagline</desc>
  <defs>
    <linearGradient id="grad-stack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1757C2"/>
    </linearGradient>
    <filter id="shadow-stack" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#1757C2" flood-opacity="0.20"/>
    </filter>
  </defs>

  <!-- Icon mark — centred -->
  <rect x="54" y="4" width="72" height="72" rx="16" fill="url(#grad-stack)" filter="url(#shadow-stack)"/>
  <!-- Back document layer -->
  <rect x="68" y="13" width="42" height="52" rx="5.5" fill="#3B82F6" opacity="0.45"/>
  <!-- Front document -->
  <rect x="62" y="20" width="42" height="50" rx="5.5" fill="white"/>
  <!-- Row 1 — checked -->
  <rect x="68" y="30" width="10" height="10" rx="2.5" fill="#1757C2"/>
  <path d="M69.5 35L71.5 37L75.5 32" fill="none" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="81" y="33" width="14" height="3" rx="1.5" fill="#C7D8F5"/>
  <!-- Row 2 — checked -->
  <rect x="68" y="43" width="10" height="10" rx="2.5" fill="#1757C2"/>
  <path d="M69.5 48L71.5 50L75.5 45" fill="none" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="81" y="46" width="11" height="3" rx="1.5" fill="#C7D8F5"/>
  <!-- Row 3 — unchecked -->
  <rect x="68" y="56" width="10" height="7" rx="2.5" fill="none" stroke="#C7D8F5" stroke-width="1.3"/>
  <rect x="81" y="58" width="14" height="3" rx="1.5" fill="#EEF1F8"/>
  <!-- Progress bar -->
  <rect x="68" y="68" width="30" height="4" rx="2" fill="#EEF1F8"/>
  <rect x="68" y="68" width="20" height="4" rx="2" fill="#3B82F6"/>

  <!-- Wordmark — centred -->
  <text x="90" y="103" font-family="'Nunito','Segoe UI',system-ui,sans-serif" font-size="26" font-weight="800" fill="#1757C2" letter-spacing="-0.5" text-anchor="middle">S-planned</text>
  <!-- Tagline — centred -->
  <text x="90" y="120" font-family="'Nunito','Segoe UI',system-ui,sans-serif" font-size="9" font-weight="700" fill="#8E9BAF" letter-spacing="2.5" text-anchor="middle">PLAN · EXECUTE · PROVE</text>
</svg>
