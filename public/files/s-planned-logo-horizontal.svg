<svg width="320" height="72" viewBox="0 0 320 72" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="S-planned logo horizontal lockup">
  <title>S-planned</title>
  <desc>S-planned logo — horizontal lockup with icon mark and wordmark</desc>
  <defs>
    <linearGradient id="grad-icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1757C2"/>
    </linearGradient>
    <filter id="shadow-icon" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1757C2" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Icon mark -->
  <rect x="0" y="4" width="64" height="64" rx="14" fill="url(#grad-icon)" filter="url(#shadow-icon)"/>
  <!-- Back document layer -->
  <rect x="16" y="12" width="38" height="46" rx="5" fill="#3B82F6" opacity="0.45"/>
  <!-- Front document -->
  <rect x="10" y="18" width="38" height="44" rx="5" fill="white"/>
  <!-- Row 1 — checked -->
  <rect x="16" y="28" width="9" height="9" rx="2" fill="#1757C2"/>
  <path d="M17.5 32.5L19.3 34.3L23 30" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="28" y="30.5" width="12" height="2.5" rx="1.25" fill="#C7D8F5"/>
  <!-- Row 2 — checked -->
  <rect x="16" y="40" width="9" height="9" rx="2" fill="#1757C2"/>
  <path d="M17.5 44.5L19.3 46.3L23 42" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="28" y="42.5" width="10" height="2.5" rx="1.25" fill="#C7D8F5"/>
  <!-- Row 3 — unchecked -->
  <rect x="16" y="52" width="9" height="6" rx="2" fill="none" stroke="#C7D8F5" stroke-width="1.3"/>
  <rect x="28" y="53.5" width="12" height="2.5" rx="1.25" fill="#EEF1F8"/>
  <!-- Progress bar -->
  <rect x="16" y="62" width="26" height="3.5" rx="1.75" fill="#EEF1F8"/>
  <rect x="16" y="62" width="17" height="3.5" rx="1.75" fill="#3B82F6"/>

  <!-- Wordmark -->
  <text x="82" y="42" font-family="'Nunito','Segoe UI',system-ui,sans-serif" font-size="32" font-weight="800" fill="#1757C2" letter-spacing="-0.5">S-planned</text>
  <!-- Tagline -->
  <text x="83" y="59" font-family="'Nunito','Segoe UI',system-ui,sans-serif" font-size="10" font-weight="700" fill="#8E9BAF" letter-spacing="3">PLAN · EXECUTE · PROVE</text>
</svg>
